# You can find more wallpapers in ~/.config/ml4w/wallpapers/
# Run ~/.config/hypr/reload-hyprpaper.sh after changing your wallpaper
# preload = ~/.config/ml4w/wallpapers/wallpaper.png

# preload = ~/Pictures/wp12746646-4k-black-minimal-wallpapers.jpg
# wallpaper = ~/Pictures/wp12746646-4k-black-minimal-wallpapers.jpg
# splash = false

wallpaper {
    monitor = eDP-1
    path = ~/Pictures/wp12746646-4k-black-minimal-wallpapers.jpg
    fit_mode = cover
}

wallpaper {
    monitor = eDP-2
    path = ~/Pictures/wp12746646-4k-black-minimal-wallpapers.jpg
    fit_mode = cover
}

wallpaper {
    monitor = HDMI-A-1
    path = ~/Pictures/wp12746646-4k-black-minimal-wallpapers.jpg
    fit_mode = cover
}

wallpaper {
    monitor = DP-9
    path = ~/Pictures/wp12746646-4k-black-minimal-wallpapers.jpg
    fit_mode = cover
}
